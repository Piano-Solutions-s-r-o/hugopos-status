# Upptime configuration — hugopos.eu status page (HUGO-541)
# Monitors only PUBLIC health endpoints. No secrets here.
owner: Piano-Solutions-s-r-o
repo: hugopos-status

sites:
  - name: Hugo API (prod)
    url: https://api.hugopos.eu/api/health
    expectedStatusCodes:
      - 200
    # Mark DOWN if the health body is missing ok:true (covers 504 / DB / Gemini degraded)
    __dangerous__body_down_if_text_missing: '"ok":true'
  - name: Hugo API (staging)
    url: https://staging.api.hugopos.eu/api/health
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: '"ok":true'

status-website:
  cname: status.hugopos.eu
  name: Hugo POS Status
  introTitle: "**Hugo POS** — Status"
  introMessage: "Live and historical uptime for the Hugo POS API (production &amp; staging). Powered by [Upptime](https://upptime.js.org)."
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/Piano-Solutions-s-r-o/hugopos-status
